services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: telebid
      POSTGRES_PASSWORD: telebid
      POSTGRES_DB: telebid
    ports:
      - "5440:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U telebid -d telebid"]
      interval: 3s
      timeout: 3s
      retries: 20
    volumes:
      - telebid-postgres:/var/lib/postgresql/data

  toxiproxy:
    image: ghcr.io/shopify/toxiproxy:2.12.0
    ports:
      - "8474:8474"
      - "8666:8666"

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      DATABASE_URL: postgres://telebid:telebid@postgres:5432/telebid
      API_PORT: 8080
      WEB_ORIGIN: http://localhost:4173
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      MINI_APP_URL: ${MINI_APP_URL:-}
      ALLOW_DEMO_AUTH: ${ALLOW_DEMO_AUTH:-true}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:8080/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 3s
      timeout: 3s
      retries: 20

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        VITE_API_URL: ""
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "4173:80"

  cloudflared:
    image: cloudflare/cloudflared:latest
    profiles: ["telegram"]
    command: tunnel --no-autoupdate --url http://web:80
    depends_on:
      web:
        condition: service_started

volumes:
  telebid-postgres:
